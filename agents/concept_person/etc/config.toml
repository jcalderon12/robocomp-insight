[Proxies]
# This property is used by the clients to connect to IceStorm.
TopicManager = "IceStorm/TopicManager:default -p 9999"
# Proxies for required interfaces
Webots2Robocomp = "webots2robocomp:tcp -h localhost -p 0"
[Endpoints]
# Endpoints for subscriptions interfaces
VisualElementsPubTopic = "tcp -p 0"
VisualElementsPubPrefix = ""

# --- Common Agent Data ---
[Agent]
id = 0 # Change id
name = "concept_person"

# --- Single Instance Configuration ---
# Use this if you only have one graph.
configFile = ""
domain = 0
tree = true
graph = true
2d = true
3d = true

# --- Multiple Instance Template ---
# If you define sub-instances, the single instance config above will be ignored.
# [Agent.instance_name]
# configFile = ""
# domain = 1
# tree = true
# graph = true
# 2d = true
# 3d = true

[Period]
Compute = 100
Emergency = 500

[Component.Debug]
Verbose = true

[Ice]
Warn.Connections = "0"
Trace.Network = "0"
Trace.Protocol = "0"
MessageSizeMax = "20004800"
